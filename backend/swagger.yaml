openapi: 3.0.3
info:
  title: Triage System API
  description: API documentation for the Triage System Backend service.
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local development server
paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status and current timestamp of the backend service.
      responses:
        '200':
          description: Service is healthy and online
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
                  message:
                    type: string
                    example: Triage System API is online
                  timestamp:
                    type: string
                    format: date-time
                    example: '2026-06-01T23:37:41.000Z'
  /api/data:
    post:
      summary: Submit data to Supabase
      description: Receives a JSON payload from the frontend and inserts it into the Supabase database.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customer_mail
                - raw_text
              properties:
                customer_mail:
                  type: string
                  example: support@example.com
                raw_text:
                  type: string
                  example: "I am having issues upgrading my tier."
                status:
                  type: string
                  example: pending
              additionalProperties: true
      responses:
        '201':
          description: Data successfully inserted
        '400':
          description: Invalid request payload
        '500':
          description: Internal server error
  /api/analytics:
    get:
      summary: Get triage analytics
      description: Retrieve aggregated statistics and metrics about ticket classifications and semantic cache performance.
      responses:
        '200':
          description: Analytics fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_tickets:
                    type: integer
                  status_distribution:
                    type: object
                  category_distribution:
                    type: object
                  priority_distribution:
                    type: object
                  sentiment_distribution:
                    type: object
                  cache_metrics:
                    type: object
        '500':
          description: Internal server error
  /api/tickets:
    get:
      summary: List tickets with pagination & filters
      description: Retrieve a paginated list of tickets filtering by status, customer mail, or classification fields.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: customer_mail
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: priority
          in: query
          required: false
          schema:
            type: string
        - name: sentiment
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: List of tickets and pagination metadata
        '500':
          description: Internal server error
  /api/tickets/{id}:
    get:
      summary: Get ticket by ID
      description: Fetch status and details of a single ticket by UUID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ticket details retrieved
        '404':
          description: Ticket not found
        '500':
          description: Internal server error
    patch:
      summary: Update ticket details (Manual Override)
      description: Update ticket status, override classification fields, or modify the drafted response.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: completed
                drafted_response:
                  type: string
                  example: "Manual support response here."
                classification:
                  type: object
                  properties:
                    category:
                      type: string
                      example: billing
                    priority:
                      type: string
                      example: high
                    sentiment:
                      type: string
                      example: frustrated
      responses:
        '200':
          description: Ticket successfully updated
        '404':
          description: Ticket not found
        '500':
          description: Internal server error
    delete:
      summary: Delete ticket
      description: Delete a ticket and its associated semantic embeddings from the database.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ticket successfully deleted
        '404':
          description: Ticket not found
        '500':
          description: Internal server error
