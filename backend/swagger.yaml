openapi: 3.0.3
info:
  title: Triage System API
  description: API documentation for the Triage System Backend service.
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local development server
paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status and current timestamp of the backend service.
      responses:
        '200':
          description: Service is healthy and online
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
                  message:
                    type: string
                    example: Triage System API is online
                  timestamp:
                    type: string
                    format: date-time
                    example: '2026-06-01T23:37:41.000Z'
  /api/data:
    post:
      summary: Submit data to Supabase
      description: Receives a JSON payload from the frontend and inserts it into the Supabase database.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Any valid JSON object representing the data to insert.
              additionalProperties: true
      responses:
        '201':
          description: Data successfully inserted
        '400':
          description: Invalid request payload
        '500':
          description: Internal server error
