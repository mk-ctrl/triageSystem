openapi: 3.0.3
info:
  title: Triage System API
  description: API documentation for the Triage System Backend service.
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local development server
paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status and current timestamp of the backend service.
      responses:
        '200':
          description: Service is healthy and online
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
                  message:
                    type: string
                    example: Triage System API is online
                  timestamp:
                    type: string
                    format: date-time
                    example: '2026-06-01T23:37:41.000Z'
